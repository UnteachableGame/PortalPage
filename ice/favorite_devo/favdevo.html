<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
	      <table class="greyGridTable">
		      <thead>
		      <tr>
			      <th>Speaker</th>
			      <th>Title</th>
			      <th>Location</th>
			      <th>Year</th>
		      </tr>
		      </thead>
		      <tbody>
		      <tr>
			      <td>President Alvin F. Meredith III</td>
			      <td>Go and Do Thou Likewise</td>
			      <td>BYUI Center</td>
			      <td>2026</td>
		      </tr>
		      <tr>
			      <td>Neihlee Muir</td>
			      <td>I Will Prepare the Way Before You</td>
			      <td>BYUI Center</td>
			      <td>2026</td>
		      </tr>
		      <tr>
			      <td>Elder Bruce C. & Sister Marie Hafen</td>
			      <td>“Severe Mercy”—Love and Sacrifice</td>
			      <td>BYUI Center</td>
			      <td>2026</td>
		      </tr>
		      </tbody>
	      </table>
	      <form>
		      <label for="speaker">Speaker</label><br>
		      <input type="text" id="speaker" name="speaker" placeholder="Speaker" /><br>
		      <label for="title">Title</label><br>
		      <input type="text" id="title" name="title" placeholder="Title" /><br>
		      <label for="location">Location</label><br>
		      <input type="text" id="location" name="location" placeholder="Location" /><br>
		      <label for="year"></label>Year<br>
		      <input type="text" id="year" name="year" placeholder="Year" /><br>
		      <input type="submit" value="Submit">
	      </form>
      </div>
    </main>
  </div>
</body>
</html>
