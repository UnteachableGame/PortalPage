<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
	        padding: 0;
        }

        body {
            background: rgb(120, 96, 64);
	        display: flex;
	        justify-content: center;
        }

        #totalContainer {
	        width: 400px;
	        height: 600px;
	        border: 10px solid navy;
	        border-radius: 5%;
	        margin: 125px;
	        position: relative;
			overflow: hidden;
        }

        /*
        This is the top container section
        ----------------------------------
        ----------------------------------
        */
        #topContainer {
	        width: 400px;
	        height: 150px;
	        position: relative;
	        /*z-index: 2;*/
        }

        #topContainer img {
	        width: 100%;
	        height: 100%;
	        object-fit: cover;
	        position: absolute;
	        z-index: 0;
			/*margin-top: 20px;*/
        }

        #topTextContainer {
	        width: 100%;
	        height: 100%;
	        position: absolute;
	        display: grid;
	        grid-template: 2fr 1fr / 1fr;
	        justify-content: space-around;
	        z-index: 1;
        }

        #topContainer h1 {
	        grid-row: 1/2;
	        align-self: end;
	        justify-self: center;
	        color: white;
	        text-shadow: 1px 1px 0 black;
	        font-size: 40px;
        }

        #topContainer h2 {
	        grid-row: 2/3;
	        align-self: start;
	        justify-self: center;
	        color: white;
	        text-shadow: 1px 1px 0 black;
	        font-size: 30px;
        }

        /*
        This is the form container section
        ----------------------------------
        ----------------------------------
        */
        #formContainer {
	        width: 100%;
	        height: 350px;
			background-color: white;
	        display: grid;
	        grid-template: 1fr 5fr / 1fr;
        }

        #formContainer h3 {
	        grid-row: 1/2;
	        align-self: center;
	        justify-self: center;
        }

        #formContainer form {
	        grid-row: 2/3;
	        display: grid;
	        grid-template: repeat(7, 1fr) / 1fr 1fr;
			align-items: center;
        }

        #closeBtn {
	        position: absolute;
	        top: 10px;
	        left: 10px;
			width: 25px;
			height: 20px;
			z-index: 10;
        }
		
		.formText {
			justify-self: start;
			padding-left: 20px;
		}
		
		.formInput {
			margin-right: 20px;
			margin-left: 20px;
			width: 150px;
			height: 15px;
		}

		#formSubContainer {
			grid-column: 1/3;
			grid-row: 5/6;
			justify-self: center;
		}
		
		#formAcknowledgeContainer {
			grid-column: 1/3;
			grid-row: 6/7;
			justify-self: center;
		}
		
		#formSubmitContainer {
			grid-column: 1/3;
			grid-row: 7/8;
			justify-self: center;
			padding-bottom: 10px;
		}
		
		#formSubmitContainer button {
			padding: 0 5px 0;
		}

        /*
		This is the bottom container section
		----------------------------------
		----------------------------------
		*/
        #bottomContainer {
			width: 400px;
	        height: 100px;
	        background-color: white;
	        display: flex;
	        flex-flow: row nowrap;
	        gap: 3px;
	        align-content: end;
        }

        #bottomContainer img {
	        width: 100%;
	        height: 100%;
			object-fit: cover;
        }
    </style>
</head>
<body>
	<div id="totalContainer">
		<div id="topContainer">
			<img src="images/jesus_feeds_5000.jpeg" alt="Jesus feeds the 5000">
			<div id="topTextContainer">
				<h1>Daily Feed</h1>
				<h2>Scripture a Day</h2>
			</div>
		</div>
		<div id="formContainer">
			<h3>Sign Up for Daily Scripture Feed</h3>
			<form id="myForm">
				<button type="button" id="closeBtn">X</button>
				<label for="username" class="formText">User Name:</label>
				<input type="text" id="username" class="formInput" name="username" required>

				<label for="password" class="formText">Password:</label>
				<input type="password" id="password" class="formInput" name="password" required>

				<label for="email" class="formText">Email:</label>
				<input type="email" id="email" class="formInput" name="email" required>

				<label class="formText">Gender:</label>
				<div id="genderFormContainer">
					<input type="radio" id="male" name="gender" value="male" required>
					<label for="male">Male</label>
					<input type="radio" id="female" name="gender" value="female" required>
					<label for="female">Female</label>
				</div>

				<section id="formSubContainer">
					<input type="checkbox" id="newsletter" name="newsletter">
					<label for="newsletter">Subscribe to newsletter</label>
				</section>

				<section id="formAcknowledgeContainer">
					<input type="checkbox" id="conditions" name="conditions" required>
					<label for="conditions">I acknowledge the terms and conditions</label>
				</section>

				<section id="formSubmitContainer">
					<button type="submit">Submit</button>
				</section>
			</form>
		</div>
		<div id="bottomContainer">
			<img src="images/old_testament.webp" alt="The Old Testament">
			<img src="images/new_testament.webp" alt="The New Testament">
			<img src="images/book_of_mormon.webp" alt="The Book of Mormon">
			<img src="images/doctrine_and_covenants.webp" alt="The Doctrine and Covenants">
			<img src="images/pearl_of_great_price.webp" alt="The Pearl of Great Price">
		</div>
	</div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        //document - contains any element in the HTML page
        //.getElementById() - finds and accesses the id of the element
        //.addEventListener() - continuously runs to listen for if the event will happen
        document.getElementById("closeBtn").addEventListener("click", function () {
			// .display - this will change the display of the element
            document.getElementById("formContainer").style.display = "none";
         });
		// const - this is a variable like int run; or run = 0
        const form = document.getElementById('myForm');
		// this will access the document's output
        const output = document.getElementById('output');

		//form will access the elements inside the form with an event listener
        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

	        //FormData - this will access all the data from the form
            const formData = new FormData(form);
            const entries = [];

			// This is a for loop
            for (const [key, value] of formData.entries()) {
                if (key === "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

			// .innerHTML - this changes the HTML structure from the output variable
            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
